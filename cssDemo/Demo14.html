<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        border: 4px solid red;
       margin: 2%;
       height:200px;
       
    }
    .container>div{
        border:2px solid green;
        height: 40px;
        width:40px;
    }
    .container>div:nth-child(odd){
        background-color: aquamarine;
    }
    .container>div:nth-child(even){
        background-color:lightcoral;
    }
    #d1{
        position:static;
        top:50px;
        left:40px;

    }
    #d2{
        position:relative;
        top:50px;
        left:30px;

    }
    #d3{
        position:fixed;
        bottom: 20px;
        
        

    }
</style>
    
</style>
<body>
     <!-- div.container>div#d${my Div $}*4 -->
    <div class="container">
        <div id="d1">my Div 1</div>
        <div id="d2">my Div 2</div>
        <div id="d3">my Div 3</div>
        <div id="d4">my Div 4</div>
    </div>
</body>
</html>
