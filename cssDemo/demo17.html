<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            display:flex;
            flex-direction:row;
            background-color: aquamarine;
            justify-content: space-between;
        }
        nav>img{
            height:40px;
            
        }
        nav>ul{
            list-style-type: none;
            display:flex;
            padding:0;
            margin:0;
            /* line-height:3%; */
            flex-direction:row;
        }
        nav>ul>li:hover{
            color: blue;
            cursor: zoom-in;
        }
        nav>ul a{
            margin: 20px;
        }
        @media all and (min-width:768px) and (max-width:991px){
            nav{
                justify-content: center;
            }
        }
        @media all and (maxwidth:767px){
            nav>img{
                display:none;
            }
            nav>ul{
                flex-direction: column;
                width:100%;
                text-align: center;
            }
            nav>ul>a{
                width:100%;
                border-bottom: 1px solid blue;
            }
        }
    </style>
</head>
<body>
    <nav>
        <img src="../images/button1.png" alt="">
        <ul>
            <li><a href="">home</a></li>
            <li><a href="">career</a></li>
            <li><a href="">details</a></li>
            <li><a href="">ert</a></li>
            <li><a href="">section</a></li>
        </ul>
    </nav>
</body>
</html>
