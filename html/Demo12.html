<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Elements Demo</title>
</head>
<body>
    <form method="post" action="/html/Demo1.html">
        <table border="1" width="100%" cellspacing="0" align="center" bgcolor="yellow">
            <thead>
                <tr>
                    <th colspan="2" align="center">INPUT ELEMENTS DEMO</th>
                </tr>
            </thead>

            <tbody align="center">
                <tr>
                    <td>User Name</td>
                    <td>
                        <input type="text" name="username" value="hateem">
                    </td>
                </tr>

                <tr>
                    <td>Password</td>
                    <td>
                        <input type="password" name="password" placeholder="type the password" minlength="2" maxlength="5">
                    </td>
                </tr>

                <tr>
                    <td>DOB</td>
                    <td>
                        <input type="date" name="dob" min="2025-12-01" max="2026-12-01">
                    </td>
                </tr>

                <tr>
                    <td>CGPA</td>
                    <td>
                        <input type="number" name="cgpa" min="1.00" max="9.99" step="0.01">
                    </td>
                </tr>

                <tr>
                    <td>University Name</td>
                    <td>
                        <input type="text" name="university" list="CLGLIST">
                        <datalist id="CLGLIST">
                            <option>AKTU</option>
                            <option>CSJM</option>
                            <option>CU</option>
                            <option>LU</option>
                            <option>JU</option>
                        </datalist>
                    </td>
                </tr>

                <tr>
                    <td>Gender</td>
                    <td>
                        <input type="radio" name="gender" id="male" value="Male">
                        <label for="male">Male</label>

                        <input type="radio" name="gender" id="female" value="Female">
                        <label for="female">Female</label>
                    </td>
                </tr>

                <tr>
                    <td>Mail</td>
                    <td>
                        <input type="email" name="email">
                    </td>
                </tr>

                <tr>
                    <td>Skills</td>
                    <td>
                        <input type="checkbox" name="skills" value="Java"> Java
                        <input type="checkbox" name="skills" value="Python"> Python
                    </td>
                </tr>

                <tr>
                    <td>Color</td>
                    <td>
                        <input type="color" name="color">
                    </td>
                </tr>

                <tr>
                    <td>Upload Photo</td>
                    <td>
                        <input type="file" name="photo" accept=".png,.jpg,.jpeg" multiple>
                    </td>
                </tr>

                <tr>
                    <td>Hidden</td>
                    <td>
                        <input type="hidden" name="hiddenData" value="hahaha">
                    </td>
                </tr>

                <tr>
                    <td>Range</td>
                    <td>
                        <input type="range" name="range" min="34" max="100" value="43">
                    </td>
                </tr>

                <tr>
                    <td>Submit</td>
                    <td>
                        <input type="submit" name="submitBtn" value="Click to Submit">
                        <input type="reset" name="resetBtn">
                        <input type="button" name="buttonBtn" value="Button">
                        
                        <button type="submit" name="emojiSubmit">&#128512;</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
</html>
