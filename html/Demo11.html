<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1" width="100%"
     cellspacing="0" align="center" bgcolor="yellow">
        <thead>
            <tr>
                <th colspan="2" align="centre">INPUT ELEMENTS DEMO</th>
            </tr>
        </thead>
        <tbody align="center">
            <tr>
                <td>User Name</td>
                <td><input type="text" value="hateem"/></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" placeholder="type the password" minlength="2" maxlength="5"/></td>
            </tr>
            <tr>
                <td>DOB</td>
                <td><input type="date" min="2025-12-01" max="2026-12-01"/></td>
            </tr>
            <tr>
                <td>CGPA</td>
                <td><input type="number" min="1.00" max="9.99" step="0.01"/></td>
            </tr>
            <tr>
                <td>CITY</td>
                <td><select name="City" id="" >
                    <option>kanpur</option>
                    <option>lucknow</option>
                    <option disabled selected>--Select YOur City</option>
                </select>
                
                </td>
            </tr>
            <tr>
                <td>University Name</td>
                <td><input type="text" list="CLGLIST"/>
                <datalist id="CLGLIST">
                    <option>AKTU</option>
                    <option>CSJM</option>
                    <option>CU</option>
                    <option>LU</option>
                    <option>JU</option>
                </datalist></td>
            </tr>
            <tr>
            <tr>
                <td>Search Anything</td>
                <td><input type="search"  /></td>
            </tr>
            <tr>
                <td>GEnder</td>
                <td><input type="radio" name="gen" id="male"/><label for="male">Male</label>
                    <input type="radio" name="gen" id="female"/><label for="female">Female</label>
                     

               
               

                </td>
            </tr>
             <tr>
                <td>MAIL</td>
                <td><input type="email"/></td>
            </tr>
             <tr>
                <td>Skills</td>
                <td>
                <input type="checkbox"/>java
                <input type="checkbox"/>python
                </td>
                
                
           
            </tr>
            <tr>
                <td>color</td>
                <td><input type="color"/></td>
            </tr>
            
            <tr>
                <td>Date and time</td>
                <td><input type="datetime-local"/></td>
            </tr>
            <tr>
                <td>Upload PHoto</td>
                <td><input type="file" accept=".png , .jpg , .jpeg" multiple/></td>
            </tr>
            
            <tr>
                <td>Hidden</td>
                <td><input type="hidden" value="hahaha"/></td>
            </tr>
            <tr>
                <td>Month and week
                </td>
                <td>
                    <input type="month" />
                    <input type="week" />
                
                </td>
            </tr>
            <tr>
                <td>Range</td>
                <td><input type="range" min="34" max="100" value="43"/></td>
            </tr>
            <tr>
                <td>Submit</td>
                <td>
                    <input type="submit" value="click to submit"/>
                    <input type="reset"/>
                    <input type="button" value="button"/>
                    <input type="image" src="/images/button1.png" width="100px" value="imagebutton"/>
                    <button type="submit">&#128512</button>
                
                
                
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
